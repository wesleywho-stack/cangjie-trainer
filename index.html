<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡/速成修煉場</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang HK", "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", sans-serif;
            background-color: #1a1a24;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            background-color: #242530;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            max-width: 850px;
            border: 1px solid #323446;
        }
        @media (min-width: 600px) {
            .game-container { padding: 40px; border-radius: 28px; }
        }
        h1 { color: #00d2ff; margin-top: 0; font-size: 24px; margin-bottom: 5px; letter-spacing: 1px; }
        .sub-title { color: #8b8ea8; font-size: 13px; margin-bottom: 15px; }
        @media (min-width: 600px) { h1 { font-size: 32px; } .sub-title { font-size: 14px; } }
        
        .scoreboard {
            background-color: #191a24;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 15px;
            border: 1px solid #2d2f3f;
        }

        .mode-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .mode-btn {
            background-color: #2d2f3f;
            border: 2px solid #3c3f54;
            color: #a0a4c0;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            flex: 1;
            max-width: 180px;
        }
        @media (min-width: 600px) {
            .mode-btn { padding: 10px 24px; font-size: 15px; }
        }
        .mode-btn.active {
            background-color: #00d2ff;
            border-color: #00d2ff;
            color: #1a1a24;
            box-shadow: 0 0 15px rgba(0,210,255,0.4);
        }
        .word-display {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            margin: 15px auto;
            background: #191a24;
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 20px;
            border: 3px solid #323446;
        }
        @media (min-width: 600px) {
            .word-display { font-size: 84px; width: 140px; height: 140px; line-height: 140px; }
        }
        .input-display {
            font-size: 28px;
            min-height: 44px;
            color: #00d2ff;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 4px;
            border-bottom: 2px solid #323446;
            display: inline-block;
            min-width: 160px;
            line-height: 44px;
        }
        @media (min-width: 600px) {
            .input-display { font-size: 32px; min-height: 48px; min-width: 200px; letter-spacing: 6px; line-height: 48px; }
        }
        .message-container {
            min-height: 85px;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            background-color: #191a24;
            border: 1px solid #2d2f3f;
        }
        .message { font-size: 15px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .explanation { font-size: 13px; color: #a0a4c0; line-height: 1.5; text-align: center; }
        @media (min-width: 600px) {
            .message { font-size: 18px; }
            .explanation { font-size: 14px; }
        }
        .success { color: #2ecc71; }
        .error { color: #ff4757; }
        .timer-highlight { color: #ff4757; font-weight: bold; font-size: 1.1em; }
        
        .keyboard {
            background-color: #12121a;
            padding: 8px;
            border-radius: 16px;
            border: 3px solid #323446;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        @media (min-width: 600px) {
            .keyboard { padding: 15px; border: 4px solid #323446; gap: 6px; }
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }

        .key {
            background: linear-gradient(135deg, #323446, #242531);
            border: 1px solid #41445b;
            color: #fff;
            flex: 1;
            max-width: 54px;
            height: 46px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 3px 0 #111116;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.05s;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .key { height: 54px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 0 #111116; }
        }
        .key:active, .key.pressed {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #111116;
            background: #00d2ff;
            color: #1a1a24;
        }
        .key .cj-char { font-size: 17px; font-weight: bold; line-height: 1; }
        .key .eng-char { font-size: 9px; color: #787c96; margin-top: 2px; }

        .space-row { margin-top: 4px; }
        .space-key {
            max-width: 60%;
            height: 40px;
            background: linear-gradient(135deg, #3c3f54, #2a2b3a);
            border-radius: 6px;
            box-shadow: 0 3px 0 #111116;
        }
        @media (min-width: 600px) {
            .space-key { height: 48px; border-radius: 8px; box-shadow: 0 4px 0 #111116; }
        }

        .control-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .ctrl-btn {
            background-color: #41445b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
            max-width: 200px;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .ctrl-btn { padding: 12px 30px; font-size: 16px; }
        }
        .ctrl-btn:hover { background-color: #4f5370; }
        .ctrl-btn.submit { background-color: #2ecc71; }
        .ctrl-btn.submit:hover { background-color: #27ae60; }
        
        .disabled-element {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>倉頡/速成修煉場</h1>
    <div class="sub-title">🏛️ 倉頡六代碼表 (常用字範圍)</div>
    
    <div class="scoreboard">
        📊 修煉成果：<span id="score-x">0</span> / <span id="score-y">0</span> 
        (<span id="score-percent">0%</span>)
    </div>

    <div class="mode-selector" id="mode-selector-block">
        <button class="mode-btn" id="btn-quick" onclick="setMode('quick')">速成模式 (頭尾)</button>
        <button class="mode-btn active" id="btn-cj" onclick="setMode('cj')">倉頡模式 (全碼)</button>
    </div>

    <div class="word-display" id="target-word">⏳</div>
    <div class="input-display" id="user-input"></div>
    
    <div class="message-container">
        <div class="message" id="msg-box">正在下載中大規範 3,000+ 完整字庫...</div>
        <div class="explanation" id="exp-box"></div>
    </div>

    <div class="keyboard" id="keyboard-block">
        <div class="keyboard-row row-1" id="kbd-row-1"></div>
        <div class="keyboard-row row-2" id="kbd-row-2"></div>
        <div class="keyboard-row row-3" id="kbd-row-3"></div>
        <div class="keyboard-row space-row">
            <button class="key space-key" id="key-SPACE" aria-label="Spacebar"></button>
        </div>
    </div>

    <div class="control-btns" id="control-block">
        <button class="ctrl-btn" onclick="clearInput()">清除 (BKSP)</button>
        <button class="ctrl-btn submit" onclick="checkAnswer()">送出答案 (Space/Enter)</button>
    </div>
</div>

<script>
    // ===== Cangjie 6 keyboard layout =====
    const row1Keys = [
        {eng:"Q", cj:"手"}, {eng:"W", cj:"田"}, {eng:"E", cj:"水"}, {eng:"R", cj:"口"}, {eng:"T", cj:"廿"},
        {eng:"Y", cj:"卜"}, {eng:"U", cj:"山"}, {eng:"I", cj:"戈"}, {eng:"O", cj:"人"}, {eng:"P", cj:"心"}
    ];
    const row2Keys = [
        {eng:"A", cj:"日"}, {eng:"S", cj:"尸"}, {eng:"D", cj:"木"}, {eng:"F", cj:"火"}, {eng:"G", cj:"土"},
        {eng:"H", cj:"竹"}, {eng:"J", cj:"十"}, {eng:"K", cj:"大"}, {eng:"L", cj:"中"}
    ];
    const row3Keys = [
        {eng:"Z", cj:"重"}, {eng:"X", cj:"難"}, {eng:"C", cj:"金"}, {eng:"V", cj:"女"}, {eng:"B", cj:"月"},
        {eng:"N", cj:"弓"}, {eng:"M", cj:"一"}
    ];

    const allKeys = [...row1Keys, ...row2Keys, ...row3Keys];

    // ===== State =====
    let PRACTICE_DB = {};      // pre-filtered CJK Unified BMP only
    let currentMode = 'cj';
    let currentCharacter = "";
    let currentInput = "";     // Chinese radicals concatenated, e.g. "手田水"
    let scoreX = 0;
    let scoreY = 0;
    let hasAnsweredCurrent = false;
    let lockKeyboard = true;
    let penaltyTimer = null;
    let recentCharacters = [];

    // ===== Helpers =====
    // DB is pre-filtered at build time to CJK Unified BMP only (U+4E00-U+9FFF)
    // so every character renders on every system with any CJK font.

    // ===== Database load =====
    async function loadCuhkDatabase() {
        try {
            const response = await fetch('cangjie6_db.json');
            if (!response.ok) throw new Error('HTTP ' + response.status);
            PRACTICE_DB = await response.json();
            
            const total = Object.keys(PRACTICE_DB).length;
            document.getElementById('msg-box').innerText =
                `✅ 倉頡六代碼表載入成功！常用 CJK ${total} 字。請開始修煉。`;
            lockKeyboard = false;
            nextWord();
        } catch (error) {
            console.error("載入失敗，啟用內置備用字庫：", error);
            PRACTICE_DB = {
                "你":"ONF","好":"VND","我":"HQI","愛":"BBPHE","學":"XBND","習":"SSHA",
                "是":"AMYO","的":"H","大":"K","來":"DOO","和":"HDR","不":"MF","在":"KLG","有":"KB","一":"M"
            };
            document.getElementById('msg-box').innerText = "⚠️ 載入失敗，已啟用內置備用字庫。";
            lockKeyboard = false;
            nextWord();
        }
    }

    // ===== Keyboard rendering =====
    function renderRow(rowId, keysArray) {
        const rowEl = document.getElementById(rowId);
        rowEl.innerHTML = '';
        keysArray.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.id = `key-${k.eng}`;
            btn.innerHTML = `<span class="cj-char">${k.cj}</span><span class="eng-char">${k.eng}</span>`;
            
            const pressHandler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (lockKeyboard) return;
                // Pass the radical Chinese char; conversion happens in handleKeyPress
                handleKeyPress(k.cj);
                triggerVisualFeedback(btn);
            };
            
            btn.addEventListener('touchstart', pressHandler, {passive: false});
            btn.addEventListener('mousedown', (e) => {
                if (e.pointerType === 'touch' || lockKeyboard) return;
                handleKeyPress(k.cj);
                triggerVisualFeedback(btn);
            });
            
            rowEl.appendChild(btn);
        });
    }

    renderRow('kbd-row-1', row1Keys);
    renderRow('kbd-row-2', row2Keys);
    renderRow('kbd-row-3', row3Keys);

    const spaceBtn = document.getElementById('key-SPACE');
    const spacePressHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (lockKeyboard) return;
        triggerVisualFeedback(spaceBtn);
        checkAnswer();
    };
    spaceBtn.addEventListener('touchstart', spacePressHandler, {passive: false});
    spaceBtn.addEventListener('mousedown', (e) => {
        if (e.pointerType === 'touch' || lockKeyboard) return;
        triggerVisualFeedback(spaceBtn);
        checkAnswer();
    });

    // Physical keyboard support — convert letter -> radical for display
    document.addEventListener('keydown', (e) => {
        if (lockKeyboard) return;
        
        const key = e.key;
        const upper = key.toUpperCase();
        if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            triggerVisualFeedback(spaceBtn);
            checkAnswer();
        } else if (key === 'Backspace') {
            e.preventDefault();
            clearInput();
        } else if (/^[a-zA-Z]$/.test(key)) {
            e.preventDefault();
            const k = allKeys.find(k => k.eng === upper);
            if (k) handleKeyPress(k.cj);
            const btn = document.getElementById(`key-${upper}`);
            if (btn) triggerVisualFeedback(btn);
        }
    });

    function triggerVisualFeedback(element) {
        if (!element) return;
        element.classList.add('pressed');
        setTimeout(() => element.classList.remove('pressed'), 100);
    }

    function setMode(mode) {
        if (lockKeyboard) return;
        currentMode = mode;
        document.getElementById('btn-quick').classList.toggle('active', mode === 'quick');
        document.getElementById('btn-cj').classList.toggle('active', mode === 'cj');
        clearInput();
        nextWord();
    }

    // Accepts Chinese radical; appends to currentInput which is compared in radicals
    function handleKeyPress(cjChar) {
        if (currentMode === 'quick' && currentInput.length >= 2) return;
        currentInput += cjChar;
        document.getElementById('user-input').textContent = currentInput;
    }

    function clearInput() {
        currentInput = "";
        const el = document.getElementById('user-input');
        if (el) el.textContent = "";
    }

    function nextWord() {
        lockKeyboard = false;
        hasAnsweredCurrent = false;
        clearInput();
        
        if (penaltyTimer !== null) {
            clearInterval(penaltyTimer);
            penaltyTimer = null;
        }
        
        document.getElementById('keyboard-block').classList.remove('disabled-element');
        document.getElementById('control-block').classList.remove('disabled-element');
        document.getElementById('mode-selector-block').classList.remove('disabled-element');
        
        const keys = Object.keys(PRACTICE_DB);
        if (keys.length === 0) {
            document.getElementById('target-word').textContent = "⚠️";
            return;
        }

        let newChar = "";
        const maxTries = Math.min(50, keys.length);
        for (let i = 0; i < maxTries; i++) {
            const candidate = keys[Math.floor(Math.random() * keys.length)];
            if (!recentCharacters.includes(candidate)) {
                newChar = candidate;
                break;
            }
        }
        if (!newChar) {
            newChar = keys[Math.floor(Math.random() * keys.length)];
        }
        
        recentCharacters.push(newChar);
        if (recentCharacters.length > 10) {
            recentCharacters.shift();
        }
        
        currentCharacter = newChar;
        const targetEl = document.getElementById('target-word');
        // Use textContent (safer for arbitrary chars) and explicit fallback font
        targetEl.textContent = currentCharacter;
        targetEl.style.fontFamily = '"PingFang HK", "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", sans-serif';
        
        document.getElementById('msg-box').innerText = "";
        document.getElementById('msg-box').className = "message";
        document.getElementById('exp-box').innerText = "";
    }

    function getQuickCode(fullCjCode) {
        if (!fullCjCode) return "";
        if (fullCjCode.length <= 2) return fullCjCode;
        return fullCjCode[0] + fullCjCode[fullCjCode.length - 1];
    }

    function updateScoreboard() {
        document.getElementById('score-x').innerText = scoreX;
        document.getElementById('score-y').innerText = scoreY;
        const percent = scoreY === 0 ? 0 : Math.round((scoreX / scoreY) * 100);
        document.getElementById('score-percent').innerText = percent + "%";
    }

    function startPenaltyCountdown(secondsLeft) {
        const expBox = document.getElementById('exp-box');
        const cjAnswer = PRACTICE_DB[currentCharacter];
        const quickAnswer = getQuickCode(cjAnswer);
        const correctAnswer = currentMode === 'quick' ? quickAnswer : cjAnswer;
        const label = currentMode === 'quick' ? '速成碼' : '倉頡編碼';

        function updateTimerText() {
            if (secondsLeft <= 0) {
                clearInterval(penaltyTimer);
                penaltyTimer = null;
                nextWord();
                return;
            }
            expBox.innerHTML = `<strong>正確答案：</strong> 字形【${currentCharacter}】的${label}為：<strong>${correctAnswer}</strong><br>` +
                               `<span class="timer-highlight">⚠️ 5秒罰時：網頁將在 ${secondsLeft} 秒後自動為你更換新字。</span>`;
            secondsLeft--;
        }

        updateTimerText();
        penaltyTimer = setInterval(updateTimerText, 1000);
    }

    function checkAnswer() {
        if (currentInput === "" || lockKeyboard) return;

        const cjAnswer = PRACTICE_DB[currentCharacter];
        const quickAnswer = getQuickCode(cjAnswer);
        // The DB code is uppercase letters; convert radical->letter for comparison
        const correctRadicals = codeToRadicals(cjAnswer);
        const correctRadicalsQuick = codeToRadicals(quickAnswer);
        const correctRadicalAnswer = currentMode === 'quick' ? correctRadicalsQuick : correctRadicals;
        
        const msgBox = document.getElementById('msg-box');

        if (!hasAnsweredCurrent) {
            scoreY++;
            hasAnsweredCurrent = true;
        }

        if (currentInput === correctRadicalAnswer) {
            scoreX++;
            updateScoreboard();

            msgBox.className = "message success";
            msgBox.innerText = "🎉 恭喜！倉頡編碼輸入正確！";
            const displayCode = currentMode === 'quick' ? quickAnswer : cjAnswer;
            const label = currentMode === 'quick' ? '速成碼' : '標準全碼';
            document.getElementById('exp-box').innerHTML = `字形【<strong>${currentCharacter}</strong>】的${label}為：<strong>${displayCode}</strong>`;
            
            lockKeyboard = true;
            setTimeout(() => {
                nextWord();
            }, 1200);
        } else {
            updateScoreboard();
            
            lockKeyboard = true;
            document.getElementById('keyboard-block').classList.add('disabled-element');
            document.getElementById('control-block').classList.add('disabled-element');
            document.getElementById('mode-selector-block').classList.add('disabled-element');

            msgBox.className = "message error";
            msgBox.innerText = `❌ 錯誤！正確按鍵應為：【${correctRadicalAnswer}】(代碼 ${correctAnswer})`;
            
            startPenaltyCountdown(5);
        }
    }

    // Convert Cangjie code letters to radical Chinese chars for display comparison
    const _engToRadical = {};
    allKeys.forEach(k => { _engToRadical[k.eng.toUpperCase()] = k.cj; });
    function codeToRadicals(code) {
        if (!code) return "";
        let out = "";
        for (const ch of code.toUpperCase()) {
            out += _engToRadical[ch] || ch;
        }
        return out;
    }

    loadCuhkDatabase();
</script>

</body>
</html>
