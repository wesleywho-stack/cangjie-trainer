<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡/速成修煉場</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            background-color: #2a2b36;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 850px;
        }
        @media (min-width: 600px) {
            .game-container { padding: 40px; border-radius: 24px; }
        }
        h1 { color: #00d2ff; margin-top: 0; font-size: 24px; margin-bottom: 15px; letter-spacing: 1px; }
        @media (min-width: 600px) { h1 { font-size: 32px; } }
        
        .scoreboard {
            background-color: #20212c;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 15px;
            border: 1px solid #3a3b4c;
        }

        .mode-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .mode-btn {
            background-color: #3a3b4c;
            border: 2px solid #4a4b62;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            flex: 1;
            max-width: 180px;
        }
        @media (min-width: 600px) {
            .mode-btn { padding: 10px 24px; font-size: 15px; }
        }
        .mode-btn.active {
            background-color: #00d2ff;
            border-color: #00d2ff;
            color: #1e1e24;
            box-shadow: 0 0 15px rgba(0,210,255,0.4);
        }
        .word-display {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            margin: 15px auto;
            background: #20212c;
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 20px;
            border: 3px solid #3a3b4c;
        }
        @media (min-width: 600px) {
            .word-display { font-size: 84px; width: 140px; height: 140px; line-height: 140px; }
        }
        .input-display {
            font-size: 24px;
            min-height: 38px;
            color: #00d2ff;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 6px;
            border-bottom: 2px solid #3a3b4c;
            display: inline-block;
            min-width: 160px;
        }
        @media (min-width: 600px) {
            .input-display { font-size: 28px; min-height: 42px; min-width: 200px; letter-spacing: 8px; }
        }
        .message-container {
            min-height: 80px;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            background-color: #20212c;
        }
        .message { font-size: 15px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .explanation { font-size: 13px; color: #b4b7c6; line-height: 1.5; text-align: center; }
        @media (min-width: 600px) {
            .message { font-size: 18px; }
            .explanation { font-size: 14px; }
        }
        .success { color: #2ecc71; }
        .error { color: #ff4757; }
        .timer-highlight { color: #ff4757; font-weight: bold; font-size: 1.1em; }
        
        .keyboard {
            background-color: #15151c;
            padding: 8px;
            border-radius: 16px;
            border: 3px solid #3a3b4c;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        @media (min-width: 600px) {
            .keyboard { padding: 15px; border: 4px solid #3a3b4c; gap: 6px; }
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }

        .key {
            background: linear-gradient(135deg, #3a3b4c, #2d2e3d);
            border: 1px solid #4a4b62;
            color: #fff;
            flex: 1;
            max-width: 54px;
            height: 46px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 3px 0 #1a1b24;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.05s;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .key { height: 54px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 0 #1a1b24; }
        }
        .key:active, .key.pressed {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a1b24;
            background: #00d2ff;
            color: #1e1e24;
        }
        .key .cj-char { font-size: 15px; font-weight: bold; }
        .key .eng-char { font-size: 9px; color: #888; margin-top: 1px; }

        .space-row { margin-top: 4px; }
        .space-key {
            max-width: 60%;
            height: 40px;
            background: linear-gradient(135deg, #44465a, #313242);
            border-radius: 6px;
            box-shadow: 0 3px 0 #1a1b24;
        }
        @media (min-width: 600px) {
            .space-key { height: 48px; border-radius: 8px; box-shadow: 0 4px 0 #1a1b24; }
        }

        .control-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .ctrl-btn {
            background-color: #4e5066;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
            max-width: 200px;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .ctrl-btn { padding: 12px 30px; font-size: 16px; }
        }
        .ctrl-btn:hover { background-color: #5f627d; }
        .ctrl-btn.submit { background-color: #2ecc71; }
        .ctrl-btn.submit:hover { background-color: #27ae60; }
        
        .disabled-element {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🎯 倉頡/速成修煉場</h1>
    
    <div class="scoreboard">
        📊 修煉成果：<span id="score-x">0</span> / <span id="score-y">0</span> 
        (<span id="score-percent">0%</span>)
    </div>

    <div class="mode-selector" id="mode-selector-block">
        <button class="mode-btn" id="btn-quick" onclick="setMode('quick')">速成模式 (頭尾)</button>
        <button class="mode-btn active" id="btn-cj" onclick="setMode('cj')">倉頡模式 (全碼)</button>
    </div>

    <div class="word-display" id="target-word">-</div>
    <div class="input-display" id="user-input"></div>
    
    <div class="message-container">
        <div class="message" id="msg-box"></div>
        <div class="explanation" id="exp-box"></div>
    </div>

    <div class="keyboard" id="keyboard-block">
        <div class="keyboard-row row-1" id="kbd-row-1"></div>
        <div class="keyboard-row row-2" id="kbd-row-2"></div>
        <div class="keyboard-row row-3" id="kbd-row-3"></div>
        <div class="keyboard-row space-row">
            <button class="key space-key" id="key-SPACE" aria-label="Spacebar"></button>
        </div>
    </div>

    <div class="control-btns" id="control-block">
        <button class="ctrl-btn" onclick="clearInput()">清除 (BKSP)</button>
        <button class="ctrl-btn submit" onclick="checkAnswer()">送出答案 (Space/Enter)</button>
    </div>
</div>

<script>
    // 📚 數據完全校對 ifreesite 倉頡三代標準
    const CANGJIE_DB = {
        "江": "水工", "和": "竹木口", "校": "木卜交大", "時": "日土木戈", "港": "水廿金山", 
        "明": "日月", "的": "竹白日戈", "我": "竹手戈", "是": "日走人", "天": "一大", 
        "地": "土心木", "人": "人", "大": "大", "中": "中", "國": "囗戈一口", "學": "竹難月木", 
        "文": "卜大", "理": "王里", "工": "工", "作": "人竹一一", "你": "人爾", "他": "人也", 
        "新": "立木斤", "年": "人手十", "快": "心決", "樂": "白女木", "生": "竹手一", 
        "日": "日", "月": "月", "山": "山", "水": "水", "火": "火", "木": "木", "土": "土", 
        "金": "金", "田": "田", "石": "石", "看": "手目", "聽": "耳十田心", "說": "言兌", 
        "讀": "言賣", "寫": "十月一", "字": "十子", "出": "山山", "入": "入", "分": "八刀",
        "春": "手大日", "夏": "一自夂", "秋": "火竹木", "冬": "夂一一", "海": "水每", 
        "空": "十金一", "能": "戈月匕匕", "道": "卜首", "路": "口一竹水口", "車": "十田十",
        "安": "十女", "北": "中北", "本": "木一", "不": "一本", "長": "長",
        "全": "人王", "同": "月一口", "成": "戈竹尸", "向": "竹一口", "老": "十大心",
        "西": "西", "要": "西女", "前": "廿月利", "後": "竹人夂水", "各": "夂口",
        "少": "火竹", "多": "夕夕", "太": "大戈", "市": "卜中月", "交": "卜交大",
        "米": "米", "自": "竹目", "己": "尸己", "已": "尸己",
        "東": "木田", "南": "十月廿十", "方": "卜方",
        "花": "廿化", "草": "廿早", "風": "竹凡戈", "雨": "一月卜十", "電": "一月田山",
        "法": "水土戈", "治": "水戈口", "經": "糸一女一", "濟": "水卜難", "政": "一正大",
        "府": "戈人木", "部": "卜口弓中", "門": "門", "問": "門口", "開": "門開",
        "關": "門關", "見": "月兒", "規": "夫月", "則": "貝利",
        "美": "廿大弓", "麗": "一月朋鹿", "華": "廿一華", "實": "十貫", "虛": "卜虍一金",
        "高": "卜高", "低": "人竹氐", "意": "卜音心", "思": "田心", "想": "木目心",
        "愛": "爪月心夂", "情": "心手一月", "感": "戈一口心", "應": "戈應", "受": "爪冖又",
        "容": "十金口", "易": "日竹勿", "考": "十大丂", "試": "言戈一", "驗": "馬人一動",
        "教": "十補大", "育": "卜月育", "算": "竹目廿", "數": "中女大", "科": "禾斗",
        "技": "手十支", "藝": "廿土丸戈", "術": "竹人戈金弓", "親": "立木月見", "戚": "戈戚",
        "朋": "月月", "友": "大友", "體": "骨體", "健": "人健",
        "康": "戈康", "醫": "尸匚矢戈", "院": "弓中宀元", "病": "疒丙", "痛": "疒甬",
        "頭": "一廿一月金"
    };

    const row1Keys = [
        {eng:"Q", cj:"手"}, {eng:"W", cj:"田"}, {eng:"E", cj:"水"}, {eng:"R", cj:"口"}, {eng:"T", cj:"廿"}, {eng:"Y", cj:"卜"}, {eng:"U", cj:"山"}, {eng:"I", cj:"戈"}, {eng:"O", cj:"人"}, {eng:"P", cj:"心"}
    ];
    const row2Keys = [
        {eng:"A", cj:"日"}, {eng:"S", cj:"尸"}, {eng:"D", cj:"木"}, {eng:"F", cj:"火"}, {eng:"G", cj:"土"}, {eng:"H", cj:"竹"}, {eng:"J", cj:"十"}, {eng:"K", cj:"大"}, {eng:"L", cj:"中"}
    ];
    const row3Keys = [
        {eng:"Z", cj:"重"}, {eng:"X", cj:"難"}, {eng:"C", cj:"金"}, {eng:"V", cj:"女"}, {eng:"B", cj:"月"}, {eng:"N", cj:"弓"}, {eng:"M", cj:"一"}
    ];

    const allKeys = [...row1Keys, ...row2Keys, ...row3Keys];

    let currentMode = 'cj'; 
    let currentCharacter = "";
    let currentInput = "";
    
    let scoreX = 0; 
    let scoreY = 0; 
    let hasAnsweredCurrent = false; 
    let lockKeyboard = false; 
    let penaltyTimer = null;

    function renderRow(rowId, keysArray) {
        const rowEl = document.getElementById(rowId);
        keysArray.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.id = `key-${k.eng}`;
            btn.innerHTML = `<span class="cj-char">${k.cj}</span><span class="eng-char">${k.eng}</span>`;
            
            const pressHandler = (e) => {
                e.preventDefault();
                if (lockKeyboard) return;
                handleKeyPress(k.cj);
                triggerVisualFeedback(btn);
            };
            
            btn.addEventListener('touchstart', pressHandler, {passive: false});
            btn.addEventListener('mousedown', (e) => {
                if (e.pointerType === 'touch' || lockKeyboard) return;
                handleKeyPress(k.cj);
                triggerVisualFeedback(btn);
            });
            
            rowEl.appendChild(btn);
        });
    }

    renderRow('kbd-row-1', row1Keys);
    renderRow('kbd-row-2', row2Keys);
    renderRow('kbd-row-3', row3Keys);

    const spaceBtn = document.getElementById('key-SPACE');
    const spacePressHandler = (e) => {
        e.preventDefault();
        if (lockKeyboard) return;
        triggerVisualFeedback(spaceBtn);
        checkAnswer();
    };
    spaceBtn.addEventListener('touchstart', spacePressHandler, {passive: false});
    spaceBtn.addEventListener('mousedown', (e) => {
        if (e.pointerType === 'touch' || lockKeyboard) return;
        triggerVisualFeedback(spaceBtn);
        checkAnswer();
    });

    document.addEventListener('keydown', (e) => {
        if (lockKeyboard) return;
        
        const char = e.key.toUpperCase();
        if (char === 'ENTER' || e.key === ' ') {
            e.preventDefault(); 
            const btn = document.getElementById('key-SPACE');
            triggerVisualFeedback(btn);
            checkAnswer();
        } else if (char === 'BACKSPACE') {
            clearInput();
        } else {
            const found = allKeys.find(k => k.eng === char);
            if (found) {
                handleKeyPress(found.cj);
                const btn = document.getElementById(`key-${char}`);
                triggerVisualFeedback(btn);
            }
        }
    });

    function triggerVisualFeedback(element) {
        if (!element) return;
        element.classList.add('pressed');
        setTimeout(() => element.classList.remove('pressed'), 100);
    }

    function setMode(mode) {
        if (lockKeyboard) return;
        currentMode = mode;
        document.getElementById('btn-quick').classList.toggle('active', mode === 'quick');
        document.getElementById('btn-cj').classList.toggle('active', mode === 'cj');
        clearInput();
        nextWord();
    }

    function handleKeyPress(cjChar) {
        if (currentMode === 'quick' && currentInput.length >= 2) return; 
        currentInput += cjChar;
        document.getElementById('user-input').innerText = currentInput;
    }

    function clearInput() {
        if (lockKeyboard) return;
        currentInput = "";
        document.getElementById('user-input').innerText = "";
    }

    function nextWord() {
        lockKeyboard = false;
        document.getElementById('keyboard-block').classList.remove('disabled-element');
        document.getElementById('control-block').classList.remove('disabled-element');
        document.getElementById('mode-selector-block').classList.remove('disabled-element');
        
        const keys = Object.keys(CANGJIE_DB);
        let newChar = currentCharacter;
        
        while (newChar === currentCharacter) {
            newChar = keys[Math.floor(Math.random() * keys.length)];
        }
        
        currentCharacter = newChar;
        document.getElementById('target-word').innerText = currentCharacter;
        hasAnsweredCurrent = false; 
        clearInput();
        document.getElementById('msg-box').innerText = "";
        document.getElementById('exp-box').innerText = "";
    }

    function getQuickCode(fullCjCode) {
        if (!fullCjCode) return "";
        if (fullCjCode.length <= 2) return fullCjCode;
        return fullCjCode[0] + fullCjCode[fullCjCode.length - 1];
    }

    function updateScoreboard() {
        document.getElementById('score-x').innerText = scoreX;
        document.getElementById('score-y').innerText = scoreY;
        const percent = scoreY === 0 ? 0 : Math.round((scoreX / scoreY) * 100);
        document.getElementById('score-percent').innerText = percent + "%";
    }

    function startPenaltyCountdown(secondsLeft) {
        const expBox = document.getElementById('exp-box');
        const cjAnswer = CANGJIE_DB[currentCharacter];
        
        function updateTimerText() {
            if (secondsLeft <= 0) {
                clearInterval(penaltyTimer);
                nextWord();
                return;
            }
            
            expBox.innerHTML = `<strong>正確編碼：</strong> 字形【${currentCharacter}】的全編碼為：<strong>${cjAnswer}</strong><br>` +
                               `<span class="timer-highlight">⚠️ 5秒罰時：將在 ${secondsLeft} 秒後自動進到下一題。</span>`;
            secondsLeft--;
        }
        
        updateTimerText();
        penaltyTimer = setInterval(updateTimerText, 1000);
    }

    function checkAnswer() {
        if (currentInput === "" || lockKeyboard) return;

        const cjAnswer = CANGJIE_DB[currentCharacter];
        const quickAnswer = getQuickCode(cjAnswer);
        const correctAnswer = currentMode === 'quick' ? quickAnswer : cjAnswer;
        
        const msgBox = document.getElementById('msg-box');

        if (!hasAnsweredCurrent) {
            scoreY++;
            hasAnsweredCurrent = true;
        }

        if (currentInput === correctAnswer) {
            scoreX++; 
            updateScoreboard();

            msgBox.className = "message success";
            msgBox.innerText = "🎉 答案正確！";
            document.getElementById('exp-box').innerHTML = `字形【<strong>${currentCharacter}</strong>】的編碼為：<strong>${cjAnswer}</strong> ｜ 速成頭尾碼為：<strong>${quickAnswer}</strong>`;
            
            lockKeyboard = true; 
            setTimeout(() => {
                nextWord();
            }, 1200); 
        } else {
            updateScoreboard(); 
            
            lockKeyboard = true;
            document.getElementById('keyboard-block').classList.add('disabled-element');
            document.getElementById('control-block').classList.add('disabled-element');
            document.getElementById('mode-selector-block').classList.add('disabled-element');

            msgBox.className = "message error";
            msgBox.innerText = `❌ 錯誤！正確答案是：【${correctAnswer}】`;
            
            startPenaltyCountdown(5);
        }
    }

    nextWord();
</script>

</body>
</html>
